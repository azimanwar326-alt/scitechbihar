<style>
body {
  font-family: Arial, sans-serif;
  background: #e8f5e9;
  text-align: center;
  margin: 0;
  padding: 20px;
}

h1 {
  margin-top: 20px;
  font-size: 1.8rem;
}

.card-container {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 20px;
  margin: 40px auto;
  max-width: 800px;
}

.card {
  width: 220px;
  padding: 25px;
  border-radius: 15px;
  color: white;
  cursor: pointer;
  font-size: 18px;
  font-weight: bold;
  transition: 0.3s;
  box-shadow: 0 8px 20px rgba(0,0,0,0.2);
}

.heat { 
  background: #9c27b0; /* बैंगनी (Purple) रंग */
  color: white;        /* टेक्स्ट का रंग सफेद */
}




.card:hover {
  transform: scale(1.05);
}

/* Topic Colors */
.heart { background: #e53935; }
.respiration { background: #43a047; }
.digestion { background: #fb8c00; }

.back-btn {
  display: inline-block;
  margin: 30px 20px 20px;
  padding: 12px 24px;
  background: #0d47a1;
  color: white;
  border-radius: 8px;
  text-decoration: none;
  font-size: 16px;
}

/* Responsive adjustments for mobile screens */
@media (max-width: 600px) {
  h1 {
    font-size: 1.5rem;
  }

  .card-container {
    flex-direction: column;
    align-items: center;
    gap: 15px;
    margin: 20px auto;
  }

  .card {
    width: 85%;
    max-width: 300px;
    padding: 20px;
    font-size: 18px;
  }

  .back-btn {
    padding: 10px 20px;
    font-size: 14px;
  }
}
</style>
</head>
