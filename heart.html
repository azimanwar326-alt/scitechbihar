<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<title>Heart Quiz - SciTech Bihar</title>

<style>
body {
  font-family: Arial;
  background: #ffebee;
  margin: 0;
  text-align: center;
}

h1 {
  margin-top: 20px;
}

/* Section Buttons */
.section-buttons {
  margin: 20px;
}

.section-buttons button {
  padding: 10px 15px;
  margin: 5px;
  border: none;
  border-radius: 6px;
  background: #e53935;
  color: white;
  cursor: pointer;
}

.section-buttons button.active {
  background: #b71c1c;
}

/* Progress Bar */
.progress-container {
  width: 80%;
  margin: auto;
  background: #ddd;
  height: 10px;
  border-radius: 5px;
}

#progress-bar {
  height: 10px;
  width: 0%;
  background: #e53935;
  border-radius: 5px;
}

/* Quiz Box */
#mcq-bilingual-container {
  margin: 20px auto;
  width: 90%;
  max-width: 500px;
}

/* Next Button */
#nextBtn {
  padding: 10px 20px;
  background: #0d47a1;
  color: white;
  border: none;
  border-radius: 6px;
  margin-top: 10px;
  display: none;
  cursor: pointer;
}

/* Score */
#score {
  font-size: 18px;
  margin-top: 10px;
}

/* Back Button */
.back-btn {
  display: inline-block;
  margin: 20px;
  padding: 10px 20px;
  background: #0d47a1;
  color: white;
  border-radius: 8px;
  text-decoration: none;
}
</style>
</head>

<!-- 🔥 IMPORTANT: JSON connect -->
<body data-class="7" data-sub="sci" data-page="heart">

<h1>❤️ Heart Quiz (हृदय)</h1>

<!-- 🌐 Language Toggle -->
<button id="langToggle" onclick="toggleLang()">🌐 EN</button>

<!-- ⏱ Timer -->
<p>⏱️ Time: <span id="timer">30</span> sec</p>

<!-- 🔢 Sections -->
<div class="section-buttons">
  <button onclick="loadSection('section1', this)">1</button>
  <button onclick="loadSection('section2', this)">2</button>
  <button onclick="loadSection('section3', this)">3</button>
  <button onclick="loadSection('section4', this)">4</button>
  <button onclick="loadSection('section5', this)">5</button>
</div>

<!-- 📊 Progress -->
<div class="progress-container">
  <div id="progress-bar"></div>
</div>
<p id="progress-text"></p>

<!-- 🧠 Quiz Container -->
<div id="mcq-bilingual-container"></div>

<!-- ▶ Next Button -->
<button id="nextBtn" onclick="nextQuestion()">Next</button>

<!-- 📊 Score -->
<p id="score"></p>

<!-- 🔙 Back -->
<a href="biology.html" class="back-btn">⬅ Back to Biology</a>

<!-- 🔊 Sound (optional) -->
<audio id="correctSound" src="correct.mp3"></audio>
<audio id="wrongSound" src="wrong.mp3"></audio>

<!-- 🔗 Script -->
<script src="script.js"></script>

</body>
</html>
