<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Heart Quiz - SciTech Bihar</title>

<style>
body {
  font-family: Arial, sans-serif;
  background: #ffebee;
  margin: 0;
  padding: 15px;
  text-align: center;
}

h1 {
  margin-top: 20px;
  font-size: 1.8rem;
}

/* Section Buttons */
.section-buttons {
  margin: 20px 0;
}

.section-buttons button {
  padding: 12px 18px;
  margin: 6px;
  border: none;
  border-radius: 8px;
  background: #e53935;
  color: white;
  cursor: pointer;
  font-size: 16px;
}

.section-buttons button.active {
  background: #b71c1c;
}

/* Progress Bar */
.progress-container {
  width: 90%;
  max-width: 500px;
  margin: auto;
  background: #ddd;
  height: 12px;
  border-radius: 6px;
}

#progress-bar {
  height: 12px;
  width: 0%;
  background: #e53935;
  border-radius: 6px;
}

p {
  font-size: 16px;
}

/* Quiz Box */
#mcq-bilingual-container {
  margin: 20px auto;
  width: 90%;
  max-width: 500px;
  font-size: 16px;
}

/* Next Button */
#nextBtn {
  padding: 12px 24px;
  background: #0d47a1;
  color: white;
  border: none;
  border-radius: 6px;
  margin-top: 15px;
  display: none;
  cursor: pointer;
  font-size: 16px;
}

/* Score */
#score {
  font-size: 18px;
  margin-top: 15px;
  font-weight: bold;
}

/* Back Button */
.back-btn {
  display: inline-block;
  margin: 20px;
  padding: 12px 24px;
  background: #0d47a1;
  color: white;
  border-radius: 8px;
  text-decoration: none;
  font-size: 16px;
}

/* Responsive adjustments for mobile screens */
@media (max-width: 600px) {
  h1 {
    font-size: 1.5rem;
  }

  .section-buttons button {
    padding: 10px 14px;
    font-size: 14px;
  }

  #mcq-bilingual-container, .progress-container {
    width: 95%;
  }
}
</style>
</head>

<body data-class="7" data-sub="sci" data-page="heart">

<h1>❤️ Heart Quiz (हृदय)</h1>

<button id="langToggle" onclick="toggleLang()">🌐 EN</button>

<p>⏱️ Time: <span id="timer">30</span> sec</p>

<div class="section-buttons">
  <button onclick="loadSection('section1', this)">1</button>
  <button onclick="loadSection('section2', this)">2</button>
  <button onclick="loadSection('section3', this)">3</button>
  <button onclick="loadSection('section4', this)">4</button>
  <button onclick="loadSection('section5', this)">5</button>
</div>

<div class="progress-container">
  <div id="progress-bar"></div>
</div>
<p id="progress-text"></p>

<div id="mcq-bilingual-container"></div>

<button id="nextBtn" onclick="nextQuestion()">Next</button>

<p id="score"></p>

<a href="biology.html" class="back-btn">⬅ Back to Biology</a>

<audio id="correctSound" src="correct.mp3"></audio>
<audio id="wrongSound" src="wrong.mp3"></audio>

<script src="script.js"></script>

</body>
</html>
