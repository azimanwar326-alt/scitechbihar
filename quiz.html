<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiz - SciTech Bihar</title>

<style>
* {
  box-sizing: border-box;
}

body {
  font-family: Arial, sans-serif;
  background: #f5f5f5;
  text-align: center;
  margin: 0;
  padding: 20px;
}

h1 {
  margin-top: 20px;
}

.card-container {
  display: flex;
  justify-content: center;
  flex-wrap: wrap;
  gap: 20px;
  margin-top: 40px;
}

.card {
  width: 220px;
  padding: 25px;
  border-radius: 15px;
  color: white;
  cursor: pointer;
  font-size: 18px;
  font-weight: bold;
  transition: 0.3s;
}

.card:hover {
  transform: scale(1.05);
}

.bio { background: #4caf50; }
.phy { background: #2196f3; }
.che { background: #ff9800; }
.his { background: #9c27b0; }

/* मोबाइल स्क्रीन के लिए बदलाव */
@media (max-width: 600px) {
  .card-container {
    flex-direction: column;
    align-items: center;
  }

  .card {
    width: 85%; /* कार्ड की चौड़ाई स्क्रीन के अनुसार सेट हो जाएगी */
    max-width: 300px;
    padding: 20px;
    font-size: 20px; /* मोबाइल पर टेक्स्ट को थोड़ा बड़ा किया गया है */
  }
  
  a {
    display: inline-block;
    margin-top: 30px;
    font-size: 18px;
    text-decoration: none;
    color: #007bff;
  }
}
</style>
</head>

<body>

<h1>📚 Quiz Categories</h1>

<div class="card-container">

  <div class="card bio" onclick="location.href='biology.html'">
    🧬 Biology
  </div>

  <div class="card phy">
    ⚛️ Physics (Coming Soon)
  </div>

  <div class="card che">
    🧪 Chemistry (Coming Soon)
  </div>

  <div class="card his">
    📜 History (Coming Soon)
  </div>

</div>

<br><br>
<a href="index.html">⬅ Back to Home</a>

</body>
</html>
